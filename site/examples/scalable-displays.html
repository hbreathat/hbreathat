  <p>Below is a demonstration on how to create responnsive content and display it to users:</p>
  <picture>
    <img src="../../assets/sc-logo/sc-logo.png">
    <figcaption>Fig. 1 The original logo sc-logo.png</figcaption>
  </picture>
  <picture>
    <source srcset="../../assets/sc-logo/sc-logo.svg">
    <img srcset="../assets/sc-logo/sc-logo.png">
    <figcaption>Fig. 2 SVG with fallback</figcaption>
  </picture>
  <picture>
    <img src="../assets/sc-logo/sc-logo.svg" width="200" height="120">
    <figcaption>Fig. 3 SVG without a fallback</figcaption>
  </picture>
  <picture>
    <img class="css-sc-logo" src="../../assets/sc-logo/sc-logo.png">
    <figcaption>Fig. 4 PNG styled with CSS</figcaption>
  </picture>

  <picture>
    <source media="(max-width:200px)" srcset="../../assets/sc-logo/sc-logo_105.png">
    <source media="(min-width:800px)" srcset="../../assets/sc-logo/sc-logo_140.png, ../../assets/sc-logo/sc-logo_140.png 2x">
    <img src="../../assets/sc-logo/sc-logo.png" alt="Sault College Logo">
    <figcaption>Fig. 5 using source to scale our images</figcaption>
  </picture>

    width="125"
